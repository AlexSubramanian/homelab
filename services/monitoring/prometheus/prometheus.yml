global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['192.168.1.75:9100']
        labels:
          hostname: 'arr-stack'
      - targets: ['192.168.1.103:9100']
        labels:
          hostname: 'plex'
      - targets: ['192.168.1.104:9100']
        labels:
          hostname: 'webserver'

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
        labels:
          hostname: 'arr-stack'

  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets: ['http://192.168.1.75:8080']
        labels:
          service: 'SABnzbd'
      - targets: ['http://192.168.1.75:7878']
        labels:
          service: 'Radarr'
      - targets: ['http://192.168.1.75:8989']
        labels:
          service: 'Sonarr'
      - targets: ['http://192.168.1.75:9696']
        labels:
          service: 'Prowlarr'
      - targets: ['http://192.168.1.75:6767']
        labels:
          service: 'Bazarr'
      - targets: ['http://192.168.1.75:3003']
        labels:
          service: 'Pulsarr'
      - targets: ['http://192.168.1.103:32400/web']
        labels:
          service: 'Plex'
      - targets: ['http://192.168.1.162:8123']
        labels:
          service: 'Home Assistant'
      - targets: ['https://alexsubramanian.com']
        labels:
          service: 'alexsubramanian.com'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox:9115

  # Home Assistant Prometheus integration (uncomment after enabling in HA)
  # - job_name: 'homeassistant'
  #   metrics_path: /api/prometheus
  #   bearer_token: 'YOUR_HA_LONG_LIVED_TOKEN'
  #   static_configs:
  #     - targets: ['192.168.1.162:8123']
